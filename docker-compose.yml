services:
  interview-assistant:
    build: .
    container_name: interview-assistant
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - PULSE_SERVER=unix:/run/pulse/native
    volumes:
      # X11 socket — required for the GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # PulseAudio socket — required for microphone access
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native:/run/pulse/native
      # Optional: mount a local documents folder into the container
      - ./documents:/app/documents
    devices:
      # Grant access to audio devices
      - /dev/snd:/dev/snd
    network_mode: host
